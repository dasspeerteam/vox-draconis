  <body>
    <!-- Secret Crafting Link -->
    <div id="secret-crafting-link" style="position: fixed; top: 10px; left: 10px; z-index: 99999; cursor: pointer; opacity: 0.6; transition: opacity 0.3s; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px;" onclick="checkPassword()" title="🔒 Crafting Bereich">
      <img src="Crafting%20Vox.png" alt="." style="width: 55px; height: 55px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.5); display: block;">
    </div>
    
    <script>
      // Hover-Effekt
      document.getElementById('secret-crafting-link').addEventListener('mouseenter', function() {
        this.style.opacity = '0.8';
      });
      document.getElementById('secret-crafting-link').addEventListener('mouseleave', function() {
        this.style.opacity = '0.3';
      });
      
      // Passwort-Prüfung
      function checkPassword() {
        const password = prompt('🔐 Passwort eingeben:');
        if (password === null) return; // Abbruch
        
        // Trim Leerzeichen und konvertiere zu Kleinbuchstaben
        const cleanPassword = password.trim().toLowerCase();
        
        if (cleanPassword === 'vox') {
          window.location.href = './crafting/index.html';
        } else if (cleanPassword !== '') {
          alert('❌ Falsches Passwort!');
        }
      }
    </script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
