    <style>
        :root {
            --primary-color: #ff9500;
            --primary-hover: #ffb347;
            --bg-dark: rgba(26, 26, 46, 0.95);
            --bg-card: rgba(22, 33, 62, 0.9);
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --border-color: rgba(255, 149, 0, 0.3);
            --bg-overlay: rgba(20, 15, 10, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('assets/bg-blacksmith.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--primary-color), var(--primary-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle { color: var(--text-secondary); font-size: 1.1rem; font-style: italic; }

        .sync-status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
        }

        .sync-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ecc71;
            animation: pulse 2s infinite;
        }

        .sync-indicator.offline { background: #e74c3c; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: var(--bg-card);
            padding: 20px 30px;
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
            text-align: center;
            flex: 1;
            min-width: 150px;
        }

        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary-color); }
        .stat-label { font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; }

        .controls {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .input-wrapper { position: relative; }

        input, select {
            width: 100%;
            padding: 12px 35px 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: var(--text-primary);
            font-size: 1rem;
        }

        input:focus, select:focus { outline: none; border-color: var(--primary-color); }

        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            display: none;
        }

        .clear-btn.visible { display: block; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-reset {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            border: 1px dashed rgba(255,255,255,0.2);
        }

        .table-wrapper {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: var(--primary-color);
            cursor: pointer;
            border-bottom: 2px solid var(--primary-color);
        }

        th.sortable::after { content: ' ⇅'; opacity: 0.5; }
        th.sorted-asc::after { content: ' ↑'; }
        th.sorted-desc::after { content: ' ↓'; }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover { background: rgba(255,255,255,0.03); }

        .beruf-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .beruf-schmiede { background: rgba(156, 163, 175, 0.2); color: #9ca3af; }
        .beruf-leder { background: rgba(217, 119, 6, 0.2); color: #d97706; }
        .beruf-schneider { background: rgba(167, 139, 250, 0.2); color: #a78bfa; }
        .beruf-ingenieur { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .beruf-alchemie { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .beruf-verzauberung { background: rgba(103, 232, 249, 0.2); color: #67e8f9; }
        .beruf-juwelen { background: rgba(52, 211, 153, 0.2); color: #34d399; }
        .beruf-inschriften { background: rgba(251, 146, 60, 0.2); color: #fb923c; }

        .slot-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .notiz { font-size: 0.85rem; color: var(--text-secondary); }

        .player-input {
            width: 110px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .rank-select {
            width: 85px;
            padding: 6px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.8rem;
        }

        .no-results {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            display: none;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .save-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-color);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .save-indicator.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        </div>
    </div>

        // ==================================================================
        // FIREBASE INITIALISIERUNG
        // ==================================================================
        let db, playerData = {}, currentSort = { column: null, direction: 'asc' };
        let isOnline = true;
        
        // WICHTIG: currentData erst nach DOM-Load initialisieren
        let currentData = [];

        async function initFirebase() {
            try {
                // Warte bis Firebase geladen ist
                while (!window.db) {
                    await new Promise(r => setTimeout(r, 100));
                }
                
                db = window.db;
                
                // Echtzeit-Listener für Datenänderungen
                const craftersRef = window.firebaseDoc(db, 'crafting', 'crafters');
                
                window.firebaseOnSnapshot(craftersRef, (doc) => {
                    if (doc.exists()) {
                        playerData = doc.data().data || {};
                        isOnline = true;
                        updateSyncStatus(true);
                        renderTable();
                        updateStats();
                    }
                }, (error) => {
                    console.error('Firebase Error:', error);
                    isOnline = false;
                    updateSyncStatus(false);
                    // Fallback zu localStorage
                    const local = localStorage.getItem('voxDraconisCrafters');
                    if (local) {
                        playerData = JSON.parse(local);
                        renderTable();
                        updateStats();
                    }
                });

                // Initial laden
                const docSnap = await window.firebaseGetDoc(craftersRef);
                if (!docSnap.exists()) {
                    // Erstelle leeres Dokument
                    await window.firebaseSetDoc(craftersRef, { data: {}, updated: new Date().toISOString() });
                }

            } catch (error) {
                console.error('Init Error:', error);
                // Fallback zu localStorage
                const local = localStorage.getItem('voxDraconisCrafters');
                if (local) playerData = JSON.parse(local);
                isOnline = false;
                updateSyncStatus(false);
                renderTable();
                updateStats();
            }
        }

        function updateSyncStatus(online) {
            const indicator = document.getElementById('syncIndicator');
            const text = document.getElementById('syncText');
            if (online) {
                indicator.classList.remove('offline');
                text.textContent = 'Online';
            } else {
                indicator.classList.add('offline');
                text.textContent = 'Offline (lokal)';
            }
        }

        // ==================================================================
        // FUNKTIONEN
        // ==================================================================
        function init() {
            // WICHTIG: currentData initialisieren
            currentData = [...CRAFTING_DATA];
            
            populateFilters();
            setupEvents();
            initFirebase();
            
            // Daten anzeigen - expliziter Aufruf
            renderTable();
            updateStats();
        }

        function populateFilters() {
            const berufe = ["Schmiedekunst", "Lederverarbeitung", "Schneiderei", "Ingenieurskunst", "Alchemie", "Verzauberkunst", "Juwelierskunst", "Inschriftenkunde"];
            const kategorien = [...new Set(CRAFTING_DATA.map(d => d.kategorie))].sort();
            const slots = [...new Set(CRAFTING_DATA.map(d => d.slot))].sort();

            berufe.forEach(b => document.getElementById('berufFilter').innerHTML += `<option value="${b}">${b}</option>`);
            kategorien.forEach(k => document.getElementById('kategorieFilter').innerHTML += `<option value="${k}">${k}</option>`);
            slots.forEach(s => document.getElementById('slotFilter').innerHTML += `<option value="${s}">${s}</option>`);
        }

        function getBerufClass(beruf) {
            const map = { 'Schmiedekunst': 'schmiede', 'Lederverarbeitung': 'leder', 'Schneiderei': 'schneider', 'Ingenieurskunst': 'ingenieur', 'Alchemie': 'alchemie', 'Verzauberkunst': 'verzauberung', 'Juwelierskunst': 'juwelen', 'Inschriftenkunde': 'inschriften' };
            return map[beruf] || '';
        }

        function generateId(item) {
            return `${item.beruf}_${item.kategorie}_${item.rezept}`.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const noResults = document.getElementById('noResults');
            const countEl = document.getElementById('filteredCount');
            
            if (!tbody) {
                console.error('tableBody nicht gefunden!');
                return;
            }
            
            // WICHTIG: Sicherstellen dass currentData existiert
            if (!currentData || currentData.length === 0) {
                console.log('Keine Daten vorhanden, initialisiere...');
                currentData = [...CRAFTING_DATA];
            }
            
            if (countEl) countEl.textContent = currentData.length;

            if (currentData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;">Keine Daten gefunden</td></tr>';
                if (noResults) noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            
            tbody.innerHTML = currentData.map(item => {
                const id = generateId(item);
                const saved = playerData[id] || { s1: '', r1: '', s2: '', r2: '', s3: '', r3: '' };
                return `
                    <tr>
                        <td><span class="beruf-badge beruf-${getBerufClass(item.beruf)}">${item.beruf}</span></td>
                        <td>${item.kategorie}</td>
                        <td><strong>${item.rezept}</strong></td>
                        <td><span class="slot-badge">${item.slot}</span></td>
                        <td>
                            <input type="text" class="player-input" placeholder="Name" value="${saved.s1}" onchange="updatePlayer('${id}', 's1', this.value)">
                            <select class="rank-select" onchange="updatePlayer('${id}', 'r1', this.value)">
                                <option value="">-</option>
                                <option value="Max" ${saved.r1 === 'Max' ? 'selected' : ''}>Max</option>
                                <option value="Hoch" ${saved.r1 === 'Hoch' ? 'selected' : ''}>Hoch</option>
                                <option value="Mittel" ${saved.r1 === 'Mittel' ? 'selected' : ''}>Mittel</option>
                                <option value="Anfänger" ${saved.r1 === 'Anfänger' ? 'selected' : ''}>Anf.</option>
                            </select>
                            <br>
                            <input type="text" class="player-input" placeholder="Name" value="${saved.s2}" onchange="updatePlayer('${id}', 's2', this.value)">
                            <select class="rank-select" onchange="updatePlayer('${id}', 'r2', this.value)">
                                <option value="">-</option>
                                <option value="Max" ${saved.r2 === 'Max' ? 'selected' : ''}>Max</option>
                                <option value="Hoch" ${saved.r2 === 'Hoch' ? 'selected' : ''}>Hoch</option>
                                <option value="Mittel" ${saved.r2 === 'Mittel' ? 'selected' : ''}>Mittel</option>
                                <option value="Anfänger" ${saved.r2 === 'Anfänger' ? 'selected' : ''}>Anf.</option>
                            </select>
                            <br>
                            <input type="text" class="player-input" placeholder="Name" value="${saved.s3}" onchange="updatePlayer('${id}', 's3', this.value)">
                            <select class="rank-select" onchange="updatePlayer('${id}', 'r3', this.value)">
                                <option value="">-</option>
                                <option value="Max" ${saved.r3 === 'Max' ? 'selected' : ''}>Max</option>
                                <option value="Hoch" ${saved.r3 === 'Hoch' ? 'selected' : ''}>Hoch</option>
                                <option value="Mittel" ${saved.r3 === 'Mittel' ? 'selected' : ''}>Mittel</option>
                                <option value="Anfänger" ${saved.r3 === 'Anfänger' ? 'selected' : ''}>Anf.</option>
                            </select>
                        </td>
                        <td class="notiz">${item.notiz}</td>
                    </tr>
                `;
            }).join('');
        }

        async function updatePlayer(id, field, value) {
            if (!playerData[id]) playerData[id] = { s1: '', r1: '', s2: '', r2: '', s3: '', r3: '' };
            playerData[id][field] = value;
            
            // Lokale Speicherung als Backup
            localStorage.setItem('voxDraconisCrafters', JSON.stringify(playerData));
            
            // Firebase Update
            if (db && isOnline) {
                try {
                    const craftersRef = window.firebaseDoc(db, 'crafting', 'crafters');
                    await window.firebaseSetDoc(craftersRef, { 
                        data: playerData, 
                        updated: new Date().toISOString() 
                    });
                    showSaveIndicator();
                } catch (error) {
                    console.error('Save Error:', error);
                }
            }
            
            updateStats();
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2000);
        }

        function updateStats() {
            document.getElementById('totalRecipes').textContent = CRAFTING_DATA.length;
            let count = 0;
            Object.values(playerData).forEach(d => { if (d.s1) count++; if (d.s2) count++; if (d.s3) count++; });
            document.getElementById('totalCrafters').textContent = count;
        }

        function applyFilters() {
            const searchInput = document.getElementById('searchInput');
            const berufFilter = document.getElementById('berufFilter');
            const katFilter = document.getElementById('kategorieFilter');
            const slotFilter = document.getElementById('slotFilter');
            
            if (!searchInput || !berufFilter || !katFilter || !slotFilter) return;
            
            const search = searchInput.value.toLowerCase();
            const beruf = berufFilter.value;
            const kat = katFilter.value;
            const slot = slotFilter.value;

            currentData = CRAFTING_DATA.filter(item => {
                return (!search || item.rezept.toLowerCase().includes(search) || item.notiz.toLowerCase().includes(search)) &&
                       (!beruf || item.beruf === beruf) &&
                       (!kat || item.kategorie === kat) &&
                       (!slot || item.slot === slot);
            });

            if (currentSort.column) {
                currentData.sort((a, b) => {
                    const va = a[currentSort.column].toLowerCase();
                    const vb = b[currentSort.column].toLowerCase();
                    return currentSort.direction === 'asc' ? (va < vb ? -1 : 1) : (va > vb ? -1 : 1);
                });
            }

            renderTable();
            updateStats();
            updateClearButtons();
        }

        function updateClearButtons() {
            document.getElementById('clearSearch').style.display = document.getElementById('searchInput').value ? 'block' : 'none';
        }

        function resetFilters() {
            ['searchInput', 'berufFilter', 'kategorieFilter', 'slotFilter'].forEach(id => document.getElementById(id).value = '');
            currentSort = { column: null, direction: 'asc' };
            document.querySelectorAll('th').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
            applyFilters();
        }

        function sortTable(col) {
            if (currentSort.column === col) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = col;
                currentSort.direction = 'asc';
            }
            document.querySelectorAll('th').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
            document.querySelector(`th[data-column="${col}"]`)?.classList.add(currentSort.direction === 'asc' ? 'sorted-asc' : 'sorted-desc');
            applyFilters();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({ timestamp: new Date().toISOString(), crafters: playerData }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Crafters_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData() { document.getElementById('importFile').click(); }

        async function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.crafters) {
                        playerData = data.crafters;
                        localStorage.setItem('voxDraconisCrafters', JSON.stringify(playerData));
                        
                        // Auch zu Firebase hochladen
                        if (db && isOnline) {
                            const craftersRef = window.firebaseDoc(db, 'crafting', 'crafters');
                            await window.firebaseSetDoc(craftersRef, { 
                                data: playerData, 
                                updated: new Date().toISOString() 
                            });
                        }
                        
                        renderTable();
                        alert('✅ Import erfolgreich!');
                    }
                } catch (err) { alert('❌ Fehler: ' + err.message); }
            };
            reader.readAsText(file);
        }

        function setupEvents() {
            ['searchInput', 'berufFilter', 'kategorieFilter', 'slotFilter'].forEach(id => {
                document.getElementById(id).addEventListener('input', applyFilters);
                document.getElementById(id).addEventListener('change', applyFilters);
            });
            document.getElementById('clearSearch').onclick = () => { document.getElementById('searchInput').value = ''; applyFilters(); };
            document.querySelectorAll('th.sortable').forEach(th => th.onclick = () => sortTable(th.dataset.column));
        }

        document.addEventListener('DOMContentLoaded', init);
        
        // Sicherstellen, dass Daten beim Laden angezeigt werden
        window.addEventListener('load', () => {
            if (currentData.length === 0) {
                currentData = [...CRAFTING_DATA];
                applyFilters();
            }
            renderTable();
        });
    </script>
</body>
</html>
